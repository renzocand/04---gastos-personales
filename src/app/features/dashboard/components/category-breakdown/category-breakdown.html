<ui-card>
  <div class="p-5 sm:p-6">
    <div class="flex items-start justify-between gap-3">
      <div>
        <h2 class="text-sm font-semibold text-slate-900">Por categoría</h2>
        <p class="mt-0.5 text-xs text-slate-500">Distribución del mes</p>
      </div>
      <span
        class="inline-flex flex-none items-center rounded-full bg-slate-100 px-2 py-0.5 text-xs font-medium tabular-nums text-slate-600"
        title="Montos en soles peruanos"
      >
        S/
      </span>
    </div>

    <ul class="mt-5 flex flex-col gap-4">
      @for (row of displayRows(); track row.id) {
        <li>
          <div class="flex items-center justify-between gap-3">
            <div class="flex min-w-0 items-center gap-3">
              <span
                class="flex size-9 flex-none items-center justify-center rounded-lg"
                [class]="row.iconClass"
                aria-hidden="true"
              >
                <lucide-angular [img]="row.icon" class="size-4"></lucide-angular>
              </span>
              <div class="min-w-0">
                <p class="truncate text-sm font-medium text-slate-900">
                  {{ row.label }}
                </p>
                <p class="text-xs text-slate-500">
                  {{ row.percent | number:'1.0-0' }}% del total
                </p>
              </div>
            </div>
            <p class="flex-none text-sm font-semibold tabular-nums text-slate-900">
              {{ row.totalPEN | appCurrency:'PEN' }}
            </p>
          </div>
          <div class="mt-2">
            <ui-progress-bar [percent]="row.percent" [color]="row.barColor" />
          </div>
        </li>
      }
    </ul>
  </div>
</ui-card>
